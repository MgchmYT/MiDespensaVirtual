<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Mi Despensa Virtual</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="admin-body">

  <div class="admin-layout">
    
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <div class="nav-brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="3" y1="6" x2="21" y2="6" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 10a4 4 0 01-8 0" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="admin-brand-text">Admin Panel</span>
      </div>
        <ul class="admin-nav">
            <li><a href="#" data-page="dashboard" class="active">📊 Dashboard</a></li>
            <li><a href="#" data-page="productos">📦 Productos</a></li>
            <li><a href="#" data-page="pedidos">🛒 Pedidos</a></li>
            <li><a href="#" data-page="inventario">📋 Inventario</a></li>
            <li><a href="#" data-page="facturas">🧾 Facturas</a></li>
            <li><a href="#" data-page="usuarios">👥 Usuarios</a></li>
            <li><a href="#" data-page="reportes">📈 Reportes</a></li>
        </ul>

      <div class="admin-sidebar-footer">
        <a href="/Front_User/index.html" class="admin-logout">Cerrar Sesión</a>
      </div>
    </aside>

  <main class="admin-main">
    <header class="admin-header">
        <h1 id="page-title">Dashboard</h1>
    </header>

    <div id="admin-content" class="admin-content">
        </div>
</main>

  </div>

</body>
<script>
    const contentArea = document.getElementById('admin-content');
    const pageTitle = document.getElementById('page-title');

    // Definimos el contenido de cada sección
    const routes = {
        'dashboard': { title: 'Dashboard', html: `<h3>Estadísticas Generales</h3><p>Contenido del dashboard...</p>` },
        'productos': { title: 'Productos', html: `<h3>Gestión de Productos</h3><button onclick="alert('Formulario para nuevo producto')">Agregar Producto</button>` },
        'inventario': { title: 'Inventario', html: `<h3>Inventario Actual</h3><p>Lista de existencias...</p>` },
        'pedidos': { title: 'Pedidos', html: `<h3>Gestión de Pedidos</h3><p>Lista de pedidos recientes...</p>` },
        'facturas': { title: 'Facturas', html: `<h3>Facturación</h3><p>Historial de facturas...</p>` },
        'usuarios': { title: 'Usuarios', html: `<h3>Usuarios del Sistema</h3><p>Administración de cuentas...</p>` },
        'reportes': { title: 'Reportes', html: `<h3>Reportes Mensuales</h3><p>Gráficos de ventas...</p>` }
    };

    function loadPage(page) {
        const route = routes[page] || routes['dashboard'];
        pageTitle.innerText = route.title;
        contentArea.innerHTML = route.html;

        // Actualizar clase activa en el sidebar
        document.querySelectorAll('.admin-nav a').forEach(link => {
            link.classList.remove('active');
            if(link.getAttribute('data-page') === page) link.classList.add('active');
        });
    }

    // Eventos para el sidebar
    document.querySelectorAll('.admin-nav a').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const page = link.getAttribute('data-page');
            loadPage(page);
        });
    });

    // Cargar dashboard al iniciar
    loadPage('dashboard');
</script>
</html>
