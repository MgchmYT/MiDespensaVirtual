<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Mi Despensa Virtual</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">
        <div class="nav-brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="3" y1="6" x2="21" y2="6" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 10a4 4 0 01-8 0" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="nav-brand-text">Mi Despensa Virtual</span>
      </a>
      <div class="nav-actions">
        <a href="carrito.html" class="btn-register" style="background: transparent; color: #fff; border-color: rgba(255,255,255,0.6);">
          🛒 Carrito
        </a>
      </div>
    </div>
  </nav>

  <main class="page-container">
    <div class="page-header">
      <h1 class="page-title">Nuestros Productos</h1>
      <p class="page-subtitle">Encuentra todo lo que necesitas para tu hogar</p>
    </div>

    <div class="products-grid">
      
      <div class="product-card">
        <div class="product-img-wrapper">
          <img src="https://via.placeholder.com/250" alt="Arroz" class="product-img">
        </div>
        <div class="product-info">
          <h3 class="product-title">Arroz</h3>
          <p class="product-price">$1.25</p>
          <button class="btn-add">Agregar al carrito</button>
        </div>
      </div>

      <div class="product-card">
        <div class="product-img-wrapper">
          <img src="https://via.placeholder.com/250" alt="Azúcar" class="product-img">
        </div>
        <div class="product-info">
          <h3 class="product-title">Azúcar</h3>
          <p class="product-price">$1.50</p>
          <button class="btn-add">Agregar al carrito</button>
        </div>
      </div>

      <div class="product-card">
        <div class="product-img-wrapper">
          <img src="https://via.placeholder.com/250" alt="Leche" class="product-img">
        </div>
        <div class="product-info">
          <h3 class="product-title">Leche</h3>
          <p class="product-price">$1.10</p>
          <button class="btn-add">Agregar al carrito</button>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <strong>Mi Despensa Virtual</strong> &mdash; Todos los derechos reservados &copy; 2025
  </footer>

</body>
</html>
