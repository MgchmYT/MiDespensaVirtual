<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - Mi Despensa Virtual</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">
        <div class="nav-brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="3" y1="6" x2="21" y2="6" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 10a4 4 0 01-8 0" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="nav-brand-text">Mi Despensa Virtual</span>
      </a>
      <div class="nav-actions">
        <a href="productos.html" class="btn-register" style="background: transparent; color: #fff; border-color: rgba(255,255,255,0.6);">
          Volver a tienda
        </a>
      </div>
    </div>
  </nav>

  <main class="login-container">
    <div class="login-card profile-card">
      
      <div class="profile-header">
        <img src="https://via.placeholder.com/120" alt="Foto de perfil" class="profile-img">
        <h1 class="login-title">Mi Perfil</h1>
        <p class="login-subtitle">Gestión de tu cuenta</p>
      </div>

      <div class="profile-info-group">
        <div class="profile-info-row">
          <span class="profile-label">Nombre:</span>
          <span class="profile-value">Juan Pérez</span>
        </div>
        <div class="profile-info-row">
          <span class="profile-label">Correo:</span>
          <span class="profile-value">juan@email.com</span>
        </div>
        <div class="profile-info-row">
          <span class="profile-label">Teléfono:</span>
          <span class="profile-value">0991234567</span>
        </div>
        <div class="profile-info-row">
          <span class="profile-label">Dirección:</span>
          <span class="profile-value">Quito, Ecuador</span>
        </div>
        <div class="profile-info-row">
          <span class="profile-label">Usuario:</span>
          <span class="profile-value">juanperez</span>
        </div>
      </div>

      <button class="btn-submit" onclick="editarPerfil()" style="margin-top: 1.5rem;">
        Editar Perfil
      </button>

    </div>
  </main>

  <footer>
    <strong>Mi Despensa Virtual</strong> &mdash; Todos los derechos reservados &copy; 2025
  </footer>

  <script>
    function editarPerfil() {
      alert("Aquí podrás editar la información de tu perfil.");
    }
  </script>

</body>
</html>
