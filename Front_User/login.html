```html
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Iniciar Sesión</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

.navbar{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:18px;
    font-size:24px;
    font-weight:bold;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:90vh;
}

.card{
    width:400px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

.card h2{
    text-align:center;
    color:#2c3e50;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

input:focus{
    border-color:#3498db;
    outline:none;
}

.checkbox{
    margin-top:15px;
    display:flex;
    align-items:center;
}

.checkbox input{
    width:auto;
    margin-right:10px;
}

.btn{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

.btn:hover{
    background:#2980b9;
}

.enlace{
    text-align:center;
    margin-top:20px;
}

.enlace a{
    color:#3498db;
    text-decoration:none;
}

.enlace a:hover{
    text-decoration:underline;
}

.error{
    color:red;
    text-align:center;
    margin-top:15px;
}

</style>

</head>

<body>

<nav class="navbar">
Mi Despensa Virtual
</nav>

<div class="container">

<div class="card">

<h2>Iniciar Sesión</h2>

<form id="loginForm">

<label>Correo Electrónico</label>
<input
type="email"
id="correo"
placeholder="Ingrese su correo"
required
>

<label>Contraseña</label>
<input
type="password"
id="password"
placeholder="Ingrese su contraseña"
required
>

<div class="checkbox">
<input type="checkbox" onclick="mostrarPassword()">
<span>Mostrar contraseña</span>
</div>

<p id="mensaje" class="error"></p>

<button type="submit" class="btn">
Ingresar
</button>

</form>

<div class="enlace">
¿No tienes una cuenta?
<br><br>
<a href="registro.html">Crear Cuenta</a>
</div>

</div>

</div>

<script>

const formulario=document.getElementById("loginForm");

formulario.addEventListener("submit",function(e){

e.preventDefault();

let correo=document.getElementById("correo").value.trim();
let password=document.getElementById("password").value.trim();
let mensaje=document.getElementById("mensaje");

mensaje.innerHTML="";

if(correo===""){
mensaje.innerHTML="Ingrese su correo.";
return;
}

if(password===""){
mensaje.innerHTML="Ingrese su contraseña.";
return;
}

if(password.length<8){
mensaje.innerHTML="La contraseña debe tener al menos 8 caracteres.";
return;
}

alert("Inicio de sesión exitoso.");

formulario.reset();

});

function mostrarPassword(){

let password=document.getElementById("password");

if(password.type==="password"){
password.type="text";
}else{
password.type="password";
}

}

</script>

</body>

</html>
```
