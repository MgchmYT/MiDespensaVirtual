<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión - Mi Despensa Virtual</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ─── NAVBAR ─── -->
  <nav>
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">
        <div class="nav-brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="3" y1="6" x2="21" y2="6" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 10a4 4 0 01-8 0" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="nav-brand-text">Mi Despensa Virtual</span>
      </a>
      <div class="nav-actions">
        <a href="registro.html" class="btn-register">Registrarse</a>
      </div>
    </div>
  </nav>

  <!-- ─── LOGIN FORM ─── -->
  <main class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">¡Hola de nuevo!</h1>
        <p class="login-subtitle">Ingresa a tu cuenta para continuar</p>
      </div>

      <form action="#" method="POST">
        <div class="form-group">
          <label class="form-label" for="email">Correo Electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-submit">Iniciar Sesión</button>
      </form>

      <div class="login-footer">
        ¿Aún no tienes una cuenta? <a href="registro.html">Regístrate aquí</a>
      </div>
    </div>
  </main>

  <!-- ─── FOOTER ─── -->
  <footer>
    <strong>Mi Despensa Virtual</strong> &mdash; Todos los derechos reservados &copy; 2025
  </footer>

</body>
</html>
