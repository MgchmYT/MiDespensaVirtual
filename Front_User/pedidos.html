<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Pedidos - Mi Despensa Virtual</title>

  <!-- Tipografías de Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  
  <!-- Vinculación de tu archivo CSS principal -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ─── NAVBAR ─── -->
  <nav>
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">
        <div class="nav-brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="3" y1="6" x2="21" y2="6" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 10a4 4 0 01-8 0" stroke="#1a2e1f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="nav-brand-text">Mi Despensa Virtual</span>
      </a>
      <div class="nav-actions">
        <!-- Botón para volver al perfil -->
        <a href="perfil.html" class="btn-register" style="background: transparent; color: #fff; border-color: rgba(255,255,255,0.6);">
          Volver a Mi Perfil
        </a>
      </div>
    </div>
  </nav>

  <!-- ─── CONTENEDOR DE PEDIDOS ─── -->
  <main class="page-container" style="display: flex; justify-content: center;">
    <div class="login-card cart-card">
      
      <div class="login-header" style="text-align: left; margin-bottom: 1.5rem;">
        <h1 class="login-title">Mis Pedidos</h1>
        <p class="login-subtitle">Historial de tus compras</p>
      </div>

      <!-- Contenedor responsivo para la tabla (reutilizado del carrito) -->
      <div class="table-responsive">
        <table class="cart-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Fecha</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="fw-bold">#1</td>
              <td>28/06/2026</td>
              <td>
                <!-- Etiqueta de estado -->
                <span class="status-badge status-pendiente">Pendiente</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <!-- ─── FOOTER ─── -->
  <footer>
    <strong>Mi Despensa Virtual</strong> &mdash; Todos los derechos reservados &copy; 2026
  </footer>

</body>
</html>
