<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión - Denjoh Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ─── NAVBAR ─── -->
  <nav>
    <div class="nav-inner">
      <a class="nav-brand" href="/index.html">
        <div class="nav-brand-icon">
          <img src="/Imgs/Icon Index.svg" alt="" width="25" height="25  ">
        </div>
        <span class="nav-brand-text">Denjoh Academy</span>
      </a>
      <div class="nav-actions">
        <a href="registro.html" class="btn-register">Registrarse</a>
      </div>
    </div>
  </nav>

  <!-- ─── LOGIN FORM ─── -->
  <main class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">¡Hello Again!</h1>
        <p class="login-subtitle">Ingresa a tu cuenta para continuar</p>
      </div>

      <form action="#" method="POST">
        <div class="form-group">
          <label class="form-label" for="email">Correo Electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="example@gmail.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-submit" onclick="Sign()">Iniciar Sesión</button>
      </form>

      <div class="login-footer">
        ¿Aún no tienes una cuenta? <a href="registro.html">Regístrate aquí</a>
      </div>
    </div>
  </main>

  <!-- ─── FOOTER ─── -->
  <footer>
    <strong>Denjoh Academy</strong> &mdash; Todos los derechos reservados &copy; 2025
  </footer>

</body>
<script>
function Sign() { 
    const Us = document.getElementById('email'); 
    const Pa = document.getElementById('password'); 
    
    const User = Us.value.trim(); 
    const Pass = Pa.value.trim(); 
    
    
    if (User.toLowerCase() === "mgchmyt" && Pass === "Pikachu12") { 
        alert("Has iniciado sesión con éxito"); 
        window.location.href = "dashboard.html"; 
    } else { 
        alert("Credenciales incorrectas"); 
    } 
}

</script>
</html>
